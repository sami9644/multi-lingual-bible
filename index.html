    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --text: #1e293b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        h2 { margin-top: 0; font-size: 1.5rem; text-align: center; }

        .form-group { margin-bottom: 1.5rem; }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background-color: white;
            font-size: 1rem;
            appearance: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:disabled { background-color: #cbd5e1; cursor: not-allowed; }
        button:active { opacity: 0.8; }
    </style>
</head>
<body>

<div class="container">
    <h2>Select Bible</h2>
    <form action="/bible.html" method="get" id="bibleForm">
        <div class="form-group">
            <label for="languageSelect">Language</label>
            <select id="languageSelect" name="lang" required>
                <option value="" disabled selected>Choose a language...</option>
            </select>
        </div>

        <div class="form-group">
            <label for="versionSelect">Version</label>
            <select id="versionSelect" name="directory" required disabled>
                <option value="" disabled selected>Select version...</option>

        <button type="submit" id="submitBtn" disabled>Read Now</button>

</div>

    const langSelect = document.getElementById('languageSelect');
    const verSelect = document.getElementById('versionSelect');
    const bibleForm = document.getElementById('bibleForm');
    const submitBtn = document.getElementById('submitBtn');

    // 1. Populate Languages
    bibleChoices.forEach((item, index) => {
        let opt = document.createElement('option');
        opt.value = index; 
        opt.textContent = item.language;
        langSelect.appendChild(opt);
    });

    // 2. Handle Language Change
    langSelect.addEventListener('change', (e) => {
        const selectedLang = bibleChoices[e.target.value];
        
        verSelect.innerHTML = '<option value="" disabled selected>Select version...</option>';
        verSelect.disabled = false;
        submitBtn.disabled = true;

        selectedLang.versions.forEach(v => {
            let opt = document.createElement('option');
            // Store the directory path
            opt.value = v.directory;
            opt.textContent = v.name;
            verSelect.appendChild(opt);
        });
    });

    // 3. Enable Submit
    verSelect.addEventListener('change', () => {
        submitBtn.disabled = false;
    });

    // 4. Handle Redirection with .json extension
    bibleForm.addEventListener('submit', (e) => {
        e.preventDefault(); // Stop standard form submission

        const selectedIndex = langSelect.value;
        const languageName = bibleChoices[selectedIndex].language;
        const directoryPath = verSelect.value;

        // Construct the URL: bible.html?lang=English&directory=/bibles/en_kjv.json
        const finalUrl = `bible.html?lang=${encodeURIComponent(languageName)}&directory=${encodeURIComponent(directoryPath)}.json`;

        // Redirect the user
        window.location.href = finalUrl;
    });
</script>
