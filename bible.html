<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Mini App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="app.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary sticky-top shadow-sm">
        <div class="container-fluid">
            <button id="backBtn" class="btn btn-link text-white p-0 d-none" onclick="showBooks()">
                <svg width="24" height="24" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M11.354 1.646a.5.5 0 0 1 0 .708L5.707 8l5.647 5.646a.5.5 0 0 1-.708.708l-6-6a.5.5 0 0 1 0-.708l6-6a.5.5 0 0 1 .708 0z"/></svg>
            </button>
            <span class="navbar-brand mb-0 h1 mx-auto" id="navTitle">Holy Bible</span>
        </div>
    </nav>

    <main class="container py-3" id="app">
        <div id="bookList" class="row g-2">
            <div class="text-center mt-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p>Loading Scriptures...</p>
            </div>
        </div>
        
        <div id="chapterList" class="row g-2 d-none">
            </div>

        <div id="verseContent" class="d-none">
            </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
